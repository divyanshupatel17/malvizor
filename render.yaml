services:
  - type: web
    name: malvizor
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: PORT
        value: "5000"
